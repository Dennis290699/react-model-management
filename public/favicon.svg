<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="gradOroCepillado" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5EEDC;stop-opacity:1" /> <stop offset="40%" style="stop-color:#E8D2A9;stop-opacity:1" /> <stop offset="100%" style="stop-color:#CBB682;stop-opacity:1" /> </linearGradient>
    
    <linearGradient id="gradPlatinoPulido" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" /> <stop offset="50%" style="stop-color:#F0F0F0;stop-opacity:1" /> <stop offset="100%" style="stop-color:#D8D8D8;stop-opacity:1" /> </linearGradient>

    <filter id="sombraSuave" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g text-anchor="middle" font-family="'Hoefler Text', Georgia, serif" font-weight="bold" filter="url(#sombraSuave)">
    
    <text x="250" y="380" font-size="450" fill="url(#gradOroCepillado)">A</text>
    
    <text x="180" y="320" font-size="300" fill="url(#gradPlatinoPulido)">L</text>
    
  </g>
</svg>